<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #248bcf);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .player-box {
            text-align: center; width: 90%; max-width: 400px;
            padding: 30px; border-radius: 25px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
        }
        .live-indicator {
            color: #ff3b30; font-size: 12px; font-weight: bold;
            margin-bottom: 15px; display: flex; align-items: center; justify-content: center;
        }
        .live-indicator span {
            width: 8px; height: 8px; background: #ff3b30;
            border-radius: 50%; margin-right: 6px; animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } }

        h1 { margin: 5px 0; font-size: 24px; }
        p { margin: 0 0 25px 0; color: var(--hint); }

        select {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid #ccc; background: var(--bg); color: var(--text);
            font-size: 16px; margin-bottom: 20px; outline: none;
        }

        #playBtn {
            width: 100%; padding: 16px; border-radius: 15px;
            border: none; background: var(--btn); color: var(--btn-text);
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="player-box">
    <div class="live-indicator"><span></span> ПРЯМОЙ ЭФИР</div>
    <h1 id="currentName">MCM Иркутск</h1>
    <p id="currentCity">📍 Иркутск</p>

    <select id="stationSelect">
        <option value="http://mcm.hostingradio.ru:8226/mcm128.mp3" data-city="Иркутск">MCM Иркутск</option>
        <option value="https://r-sibir.hostingradio.ru/sibir128.mp3" data-city="Томск">Радио Сибирь</option>
        <option value="https://nashe1.hostingradio.ru/nashe-128.mp3" data-city="Россия">Наше Радио</option>
        <option value="http://icecast.vgtrk.cdnvideo.ru/mayakfm_mp3_128kbps" data-city="Москва">Радио Маяк</option>
        <option value="http://vladivostokfm.hostingradio.ru:8000/vfm128.mp3" data-city="Владивосток">Владивосток FM</option>
    </select>

    <button id="playBtn">ВКЛЮЧИТЬ</button>
</div>

<audio id="audio"></audio>

<script>
    const tg = window.Telegram.WebApp;
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const stationSelect = document.getElementById('stationSelect');
    const currentName = document.getElementById('currentName');
    const currentCity = document.getElementById('currentCity');

    tg.expand();

    function updateStation() {
        const selected = stationSelect.options[stationSelect.selectedIndex];
        currentName.innerText = selected.text;
        currentCity.innerText = "📍 " + selected.getAttribute('data-city');
        
        const wasPlaying = !audio.paused;
        audio.src = selected.value;
        
        if (wasPlaying) {
            audio.load();
            audio.play();
        }
    }

    stationSelect.onchange = updateStation;

    playBtn.onclick = () => {
        if (audio.paused) {
            audio.src = stationSelect.value; // Берем ссылку из выбора
            audio.load(); // Сброс буфера для LIVE
            audio.play();
            playBtn.innerText = "ВЫКЛЮЧИТЬ";
            playBtn.style.background = "#ff3b30";
        } else {
            audio.pause();
            playBtn.innerText = "ВКЛЮЧИТЬ";
            playBtn.style.background = "var(--btn)";
        }
    };

    // Чтобы музыка не прерывалась при сворачивании (в некоторых версиях)
    tg.onEvent('mainButtonClicked', () => audio.pause());
</script>

</body>
</html>
